<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مواقيت الصلاة 🕌</title>
    <!-- icon page -->
     <link rel="icon" href="image/icon.png">
    <!-- link Css -->
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Btn Dark/Light -->
    <div class="theme-toggle">
      <button onclick="toggleTheme()" id="themeBtn">
        <i class="fas fa-moon"></i>
      </button>
    </div>
    <div class="header">
      <img src="image/logo.png" loading="lazy" class="Logo">
      <h1>مواقيت الصلاة في مصر</h1>
    </div>
    <div class="container">
      <div class="card">
        <!-- Select governorate -->
        <div class="select-wrapper">
          <i class="fas fa-map-marker-alt"></i>
          <select id="citySelect"></select>
        </div>
        <!-- History -->
        <div id="dateInfo" class="date-info"></div>
        <!-- btn-notfiction -->
        <div class="text-center mb-8">
          <button onclick="enableNotifications()" class="enable-btn">
            <i class="fas fa-bell"></i>
            تفعيل الإشعارات والأذان
          </button>
        </div>
        <!-- Next prayer -->
        <div id="nextPrayer" class="next-prayer hidden">
          <p class="label">الصلاة القادمة</p>
          <p id="nextNameTime" class="next-time"></p>
          <p id="remaining" class="remaining"></p>
        </div>
        <!-- Prayer times -->
        <div id="prayerTimes" class="prayer-grid"></div>
      </div>
      <!-- Footer -->
      <p class="footer-text">
        خلّي التبويب مفتوح أو ثبت الموقع على الشاشة الرئيسية عشان الأذان يشتغل
        <br>
        By Ahmed Elnahas &copy;
      </p>
    </div>
    <!-- link js -->
    <script src="main.js"></script>
  </body>
</html>
