<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🕌 مواقيت الصلاة - مصر</title>
    <!-- icon page -->
    <link rel="icon" href="image/icon.png" />
    <!-- link Css -->
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-logo">
          <i class="fas fa-mosque"></i>
          <span>مواقيت الصلاة</span>
        </div>
        <div class="nav-right">
          <div class="nav-icons">
            <a href="quran.html" class="nav-icon" title="القرآن الكريم">
              <i class="fas fa-book-quran"></i>
              <span>القرآن</span>
            </a>
            <a href="Audio.html" class="nav-icon" title="الصوتيات والأذان">
              <i class="fas fa-volume-up"></i>
              <span>صوتيات</span>
            </a>
          </div>
          <!-- زرار الـ Dark Mode -->
          <button
            onclick="toggleTheme()"
            id="themeBtn"
            class="theme-btn"
            title="تبديل الوضع">
            <i class="fas fa-moon"></i>
          </button>
        </div>
      </div>
    </nav>
    <!-- Header section -->
    <div class="header">
      <img src="image/logo.png" loading="lazy" class="Logo" />
      <h1>مواقيت الصلاة في مصر</h1>
    </div>
    <div class="container">
      <div class="card">
        <!-- Select governorate -->
        <div class="select-wrapper">
          <i class="fas fa-map-marker-alt"></i>
          <select id="citySelect"></select>
        </div>
        <!-- History -->
        <div id="dateInfo" class="date-info"></div>
        <!-- btn-notfiction -->
        <div class="text-center mb-8">
          <button onclick="enableNotifications()" class="enable-btn">
            <i class="fas fa-bell"></i>
            تفعيل الإشعارات والأذان
          </button>
        </div>
        <!-- Next prayer -->
        <div id="nextPrayer" class="next-prayer hidden">
          <p class="label">الصلاة القادمة</p>
          <p id="nextNameTime" class="next-time"></p>
          <p id="remaining" class="remaining"></p>
        </div>
        <!-- Prayer times -->
        <div id="prayerTimes" class="prayer-grid"></div>
      </div>
      <!-- Footer -->
      <p class="footer-text">
        خلّي التبويب مفتوح أو ثبت الموقع على الشاشة الرئيسية عشان الأذان يشتغل
        <br />
        By Ahmed Elnahas &copy;
      </p>
    </div>
    <!-- link js -->
    <script src="js/main.js"></script>
  </body>
</html>
